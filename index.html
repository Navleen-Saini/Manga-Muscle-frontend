<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout With Me</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-image: url('images/MainBGindex01.png');
            background-size: cover; 
            background-repeat: no-repeat;
            background-attachment: scroll;
        }
    </style>
</head>
<body>
    
    <div class="mainHeading">
        <div class="heading">
            <h1>Workout Insight</h1>
        </div>

        <a href="/login" class="login-btn">Login</a>
        <a href="/logout" class="login-btn">Log Out</a>

        <div class="menu">
            <button class="menubtn">Menu</button>
            <div class="dropdown-menu">
                <a href="index.html">Home</a>
                <a href="RegForm.html">Register</a>
                <a href="regPlans.html">Plans</a>
                <a href="/contacts">Contacts</a>
            </div>
        </div>
    </div>

    <!-- Muscle groups clickable items -->
     <section class="muscle-section">

        <div class="muscle-card" onclick="openExercise('chest')">
            <img src="icons/chest.png" alt="Chest">
            <p>Chest</p>
        </div>

        <div class="muscle-card" onclick="openExercise('back')">
            <img src="icons/back.png" alt="Back">
            <p>Back</p>
        </div>

        <div class="muscle-card" onclick="openExercise('biceps')">
            <img src="icons/biceps.png" alt="Biceps">
            <p>Biceps</p>
        </div>

        <div class="muscle-card" onclick="openExercise('triceps')">
            <img src="icons/triceps.png" alt="Triceps">
            <p>Triceps</p>
        </div>

        <div class="muscle-card" onclick="openExercise('quadriceps')">
            <img src="icons/quadriceps.png" alt="Quadriceps">
            <p>Quads</p>
        </div>

        <div class="muscle-card" onclick="openExercise('glutes')">
            <img src="icons/glutes.png" alt="Glutes">
            <p>Glutes</p>
        </div>
        
        <div class="muscle-card" onclick="openExercise('shoulders')">
            <img src="icons/shoulders.png" alt="Shoulders">
            <p>Shoulders</p>
        </div>

        <div class="muscle-card" onclick="openExercise('abdominals')">
            <img src="icons/abs.png" alt="Abs">
            <p>Abs</p>
        </div>
        
        <div class="muscle-card" onclick="openExercise('arms')">
            <img src="icons/arms.png" alt="Hamstrings">
            <p>Hamstrings</p>
        </div>

        <div class="muscle-card" onclick="openExercise('calves')">
            <img src="icons/calves.png" alt="Calves">
            <p>Calves</p>
        </div>
        
    </section>

    <script>

      const BACKEND_URL = "https://manga-muscle-backend-production.up.railway.app";
      
    function openExercise(muscle) {
        window.location.href = `/exercise?muscle=${muscle}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
    //using fetch to get the last muscle group from  server session
    fetch(`${BACKEND_URL}/api/session-data`, {credentials : "include"} )
        .then(response => {
            if (!response.ok) {
                throw new Error('Network response was not ok');
            }
            return response.json();
        })
        .then(data => {
            const lastMuscle = data.last_muscle_group;

            
            if (!lastMuscle) {
                lastMuscle = localStorage.getItem('last_muscle_group');
            }
            
            if (lastMuscle) {
                //selecting the card container fo muscle group
                const selector = `.muscle-card[onclick*="${lastMuscle}"]`;
                const lastCard = document.querySelector(selector);
                
                if (lastCard) {
                    //adding class to aply css for highlighting last rembeered muscle
                    lastCard.classList.add('last-visited');
                }
            }
        })
        .catch(error => {
            console.error('Error fetching session data:', error);
        });
});
    </script>

</body>
</html>
