<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exercises</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            background-color: #0f172a; 
            color: #d1d5db; 
            font-family: Arial, Helvetica, sans-serif;
            padding: 2vmin;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
   </style>
</head>
<body>

    <h1 id="muscleName"></h1>

    <div id="exerciseList">
        </div>

    <script>
        const API_KEY = '6HfZho7AGXHj3Bm4MIQIVI2kYPH9P5yaSDcmyHi5';

        const params = new URLSearchParams(window.location.search);
        const muscle = params.get("muscle");

        const displayMuscleName = muscle.charAt(0).toUpperCase() + muscle.slice(1);
        document.getElementById("muscleName").innerText = `${displayMuscleName} WORKOUTS`;

        async function loadExercises() {
            const apiURL = `https://api.api-ninjas.com/v1/exercises?muscle=${muscle}`;

            try {
                const response = await fetch(apiURL, {
                    headers: {
                        'X-Api-Key': API_KEY
                    }
                });

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                const list = document.getElementById("exerciseList");

                if (data.length === 0) {
                     list.innerHTML = `<p style="text-align: center; font-size: 3vmin;">No exercises found for ${displayMuscleName}.</p>`;
                     return;
                }

                data.forEach(ex => {
                    list.innerHTML += `
                        <div class="exercise-card">
                            <h2>${ex.name}</h2>
                            <div class="details-grid">
                                <div class="detail-item">
                                    <b>Type:</b> <span>${ex.type.toUpperCase()}</span>
                                </div>
                                <div class="detail-item">
                                    <b>Equipment:</b> <span>${ex.equipment.toUpperCase()}</span>
                                </div>
                                <div class="detail-item">
                                    <b>Difficulty:</b> <span>${ex.difficulty.toUpperCase()}</span>
                                </div>
                                <div class="detail-item">
                                    <b>Target Muscle:</b> <span>${ex.target.toUpperCase()}</span>
                                </div>
                            </div>
                            <div class="instructions">
                                <h3>Instructions:</h3>
                                <p>${ex.instructions}</p>
                            </div>
                        </div>
                    `;
                });
            } catch (error) {
                console.error("Could not fetch exercises:", error);
                document.getElementById("exerciseList").innerHTML = `<p style="text-align: center; color: red;">Error loading exercises. Please check the API key and console.</p>`;
            }
        }

        loadExercises();
    </script>

</body>
</html>
